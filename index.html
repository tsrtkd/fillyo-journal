<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>fillyo — 학원 업무일지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0B1F3A; --blue:#1352A8; --sky:#E8F1FF;
  --yellow:#F9A825; --red:#C62828;
  --gray:#546E7A; --border:#DDE4EE; --bg:#EEF2F8;
  --text:#1A2332; --text2:#4A5A6A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

/* LOGO */
.logo-wrap{text-align:center;margin-bottom:32px;}
.logo-icon{font-size:52px;animation:float 3s ease-in-out infinite;display:block;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo-name{color:var(--yellow);font-size:28px;font-weight:900;letter-spacing:-1px;margin-top:4px;}
.logo-sub{color:rgba(255,255,255,0.4);font-size:13px;margin-top:6px;}

/* CARD */
.card{background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.35);}

/* TAB */
.tab-row{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:24px;}
.tab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:14px;font-weight:700;color:var(--gray);cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all 0.18s;}
.tab.on{background:var(--navy);color:white;}

/* FORM */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--gray);margin-bottom:6px;}
.field input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--text);background:#FAFBFF;outline:none;transition:border-color 0.15s;}
.field input:focus{border-color:var(--blue);}
.field input.err{border-color:var(--red);}

/* SUBMIT */
.btn-submit{width:100%;padding:14px;background:var(--navy);color:white;border:none;border-radius:12px;font-size:16px;font-weight:900;font-family:inherit;cursor:pointer;margin-top:6px;transition:all 0.15s;position:relative;}
.btn-submit:active{transform:scale(0.98);}
.btn-submit:disabled{opacity:0.55;cursor:default;}
.btn-submit.loading::after{content:'';position:absolute;right:18px;top:50%;margin-top:-8px;width:16px;height:16px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR MSG */
.err-msg{background:#FFEBEE;color:var(--red);font-size:12px;font-weight:600;padding:10px 14px;border-radius:8px;margin-top:12px;display:none;}
.err-msg.show{display:block;}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:11px;color:var(--gray);}

/* PLAN CHIPS (회원가입 시) */
.plan-row{display:flex;gap:8px;margin-bottom:16px;}
.plan-chip{flex:1;border:2px solid var(--border);border-radius:10px;padding:12px 8px;cursor:pointer;text-align:center;transition:all 0.15s;}
.plan-chip.on{border-color:var(--blue);background:var(--sky);}
.plan-chip .pc-name{font-size:13px;font-weight:900;color:var(--text);}
.plan-chip .pc-price{font-size:11px;color:var(--gray);margin-top:3px;}
.plan-chip .pc-desc{font-size:10px;color:var(--text2);margin-top:4px;line-height:1.4;}
.plan-chip.on .pc-name{color:var(--blue);}

/* FOOTER */
.auth-footer{color:rgba(255,255,255,0.35);font-size:11px;margin-top:20px;text-align:center;line-height:1.8;}
.auth-footer a{color:rgba(255,255,255,0.55);text-decoration:none;}

/* 만료 차단 화면 */
#blockedScreen{display:none;text-align:center;}
.blocked-icon{font-size:48px;margin-bottom:12px;}
.blocked-title{color:white;font-size:20px;font-weight:900;margin-bottom:8px;}
.blocked-desc{color:rgba(255,255,255,0.55);font-size:13px;line-height:1.7;margin-bottom:24px;}
.btn-renew{background:var(--yellow);color:var(--navy);border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;}
.btn-logout-sm{margin-top:12px;background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.45);font-size:12px;padding:8px 18px;border-radius:20px;cursor:pointer;font-family:inherit;display:block;margin-left:auto;margin-right:auto;}
</style>
</head>
<body>

<div class="logo-wrap">
  <span class="logo-icon">🥋</span>
  <div class="logo-name">fillyo</div>
  <div class="logo-sub">학원 업무일지 서비스</div>
</div>

<!-- 로그인/회원가입 카드 -->
<div class="card" id="authCard">
  <div class="tab-row">
    <button class="tab on" id="tabLogin" onclick="switchTab('login')">로그인</button>
    <button class="tab" id="tabSignup" onclick="switchTab('signup')">회원가입</button>
  </div>

  <!-- 로그인 폼 -->
  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="field">
      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="example@email.com" required>
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" required>
    </div>
    <button type="submit" class="btn-submit" id="btnLogin">로그인</button>
    <div class="err-msg" id="loginErr"></div>
  </form>

  <!-- 회원가입 폼 -->
  <form id="signupForm" style="display:none;" onsubmit="doSignup(event)">
    <div class="field">
      <label>이메일</label>
      <input type="email" id="signupEmail" placeholder="example@email.com" required>
    </div>
    <div class="field">
      <label>비밀번호 (6자 이상)</label>
      <input type="password" id="signupPw" placeholder="비밀번호 입력" required minlength="6">
    </div>
    <div class="field">
      <label>비밀번호 확인</label>
      <input type="password" id="signupPw2" placeholder="비밀번호 재입력" required>
    </div>
    <div class="divider"><span>플랜 선택</span></div>
    <div class="plan-row">
      <div class="plan-chip on" id="chipFree" onclick="selectPlan('free')">
        <div class="pc-name">무료</div>
        <div class="pc-price">₩0 / 월</div>
        <div class="pc-desc">원장 혼자 사용<br>모든 기능 포함</div>
      </div>
      <div class="plan-chip" id="chipPro" onclick="selectPlan('pro')">
        <div class="pc-name">Pro</div>
        <div class="pc-price">₩9,900 / 월</div>
        <div class="pc-desc">강사+원장 공유<br>실시간 동기화</div>
      </div>
    </div>
    <button type="submit" class="btn-submit" id="btnSignup">다음 — 학원 설정</button>
    <div class="err-msg" id="signupErr"></div>
  </form>
</div>

<!-- 구독 만료 차단 화면 -->
<div id="blockedScreen">
  <div class="blocked-icon">🔒</div>
  <div class="blocked-title">구독이 만료되었습니다</div>
  <div class="blocked-desc">Pro 플랜 구독 기간이 끝났습니다.<br>갱신하면 바로 사용할 수 있습니다.</div>
  <button class="btn-renew" onclick="location.href='https://fillyo.kr/pricing'">구독 갱신하기</button>
  <button class="btn-logout-sm" onclick="doLogout()">로그아웃</button>
</div>

<div class="auth-footer">
  서비스 이용약관 · 개인정보처리방침<br>
  <a href="https://fillyo.kr">fillyo.kr</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, set }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase 설정 (fillyo 전용 프로젝트로 교체 필요) ──────────────
const FB_CONFIG = {
  apiKey:            "AIzaSyBL5lQr2VIPK9caokm90g4_eQIkA8EXjqE",
  authDomain:        "fillyo-journal.firebaseapp.com",
  projectId:         "fillyo-journal",
  storageBucket:     "fillyo-journal.firebasestorage.app",
  messagingSenderId: "594047356761",
  appId:             "1:594047356761:web:bfd402441d83eedf63c648",
  databaseURL:       "https://fillyo-journal-default-rtdb.asia-southeast1.firebasedatabase.app",
};
// ─────────────────────────────────────────────────────────────────

const app  = initializeApp(FB_CONFIG);
const auth = getAuth(app);
const db   = getDatabase(app);

let selectedPlan = 'free';

// ── 탭 전환 ──────────────────────────────────────────────────────
window.switchTab = (tab) => {
  document.getElementById('loginForm').style.display  = tab === 'login'  ? '' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('on',  tab === 'login');
  document.getElementById('tabSignup').classList.toggle('on', tab === 'signup');
  clearErrors();
};

// ── 플랜 선택 ─────────────────────────────────────────────────────
window.selectPlan = (plan) => {
  selectedPlan = plan;
  document.getElementById('chipFree').classList.toggle('on', plan === 'free');
  document.getElementById('chipPro').classList.toggle('on',  plan === 'pro');
};

// ── 에러 표시 헬퍼 ────────────────────────────────────────────────
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}
function clearErrors() {
  ['loginErr','signupErr'].forEach(id => {
    document.getElementById(id).classList.remove('show');
  });
  document.querySelectorAll('input').forEach(el => el.classList.remove('err'));
}
function setLoading(btnId, on) {
  const btn = document.getElementById(btnId);
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

// ── Firebase 에러 한국어 변환 ──────────────────────────────────────
function authErrMsg(code) {
  const map = {
    'auth/invalid-email':            '이메일 형식이 올바르지 않습니다.',
    'auth/user-not-found':           '등록되지 않은 이메일입니다.',
    'auth/wrong-password':           '비밀번호가 틀렸습니다.',
    'auth/invalid-credential':       '이메일 또는 비밀번호가 올바르지 않습니다.',
    'auth/email-already-in-use':     '이미 사용 중인 이메일입니다.',
    'auth/weak-password':            '비밀번호는 6자 이상이어야 합니다.',
    'auth/too-many-requests':        '너무 많은 시도가 있었습니다. 잠시 후 다시 시도해주세요.',
    'auth/network-request-failed':   '네트워크 연결을 확인해주세요.',
  };
  return map[code] || '오류가 발생했습니다. 다시 시도해주세요.';
}

// ── 로그인 ────────────────────────────────────────────────────────
window.doLogin = async (e) => {
  e.preventDefault();
  clearErrors();
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPw').value;
  setLoading('btnLogin', true);
  try {
    await signInWithEmailAndPassword(auth, email, pw);
    // onAuthStateChanged 에서 리디렉션 처리
  } catch (err) {
    showErr('loginErr', authErrMsg(err.code));
    setLoading('btnLogin', false);
  }
};

// ── 회원가입 ──────────────────────────────────────────────────────
window.doSignup = async (e) => {
  e.preventDefault();
  clearErrors();
  const email = document.getElementById('signupEmail').value.trim();
  const pw    = document.getElementById('signupPw').value;
  const pw2   = document.getElementById('signupPw2').value;

  if (pw !== pw2) {
    document.getElementById('signupPw2').classList.add('err');
    showErr('signupErr', '비밀번호가 일치하지 않습니다.');
    return;
  }

  setLoading('btnSignup', true);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    // 신규 유저 기본 정보 저장 (academyId 없음 → setup.html로 이동)
    await set(ref(db, `users/${cred.user.uid}`), {
      email,
      planType:    selectedPlan,
      planExpiry:  selectedPlan === 'pro' ? Date.now() + 30 * 24 * 60 * 60 * 1000 : null,
      createdAt:   Date.now(),
      academyId:   null,
    });
    // onAuthStateChanged 에서 리디렉션 처리
  } catch (err) {
    showErr('signupErr', authErrMsg(err.code));
    setLoading('btnSignup', false);
  }
};

// ── 로그아웃 ──────────────────────────────────────────────────────
window.doLogout = () => signOut(auth);

// ── 인증 상태 감지 & 리디렉션 ──────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    // 미로그인: 로그인 화면 표시
    document.getElementById('authCard').style.display  = '';
    document.getElementById('blockedScreen').style.display = 'none';
    setLoading('btnLogin',  false);
    setLoading('btnSignup', false);
    return;
  }

  // 로그인됨: 유저 데이터 확인
  const snap = await get(ref(db, `users/${user.uid}`));
  if (!snap.exists()) {
    // 데이터 없으면 로그아웃 (비정상 상태)
    await signOut(auth);
    return;
  }

  const userData = snap.val();

  // 학원 설정 미완료 → setup.html
  if (!userData.academyId) {
    location.href = 'setup.html';
    return;
  }

  // Pro 플랜 만료 체크
  if (userData.planType === 'pro' && userData.planExpiry && Date.now() > userData.planExpiry) {
    document.getElementById('authCard').style.display      = 'none';
    document.getElementById('blockedScreen').style.display = 'block';
    return;
  }

  // 정상 → 앱으로 이동
  location.href = 'app.html';
});
</script>
</body>
</html>
